<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>symbiote-node Demo</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--sn-bg, #2d2d2d);
      color: var(--sn-text, #d4d4d4);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: var(--sn-node-bg, #3d3d3d);
      border-bottom: 1px solid var(--sn-node-border, rgba(255, 255, 255, 0.06));
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    header .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: color-mix(in srgb, var(--sn-cat-server, #5cb8ff) 20%, transparent);
      color: var(--sn-cat-server, #5cb8ff);
    }

    header .spacer {
      flex: 1;
    }

    header .demo-btn {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border: 1px solid var(--sn-node-border, #555);
      border-radius: 4px;
      background: var(--sn-node-hover, #444);
      color: var(--sn-text, #d4d4d4);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
    }

    header .demo-btn:hover {
      background: color-mix(in srgb, var(--sn-node-hover, #505050) 80%, white);
      border-color: var(--sn-text-dim, #777);
    }

    header .demo-btn.active {
      background: color-mix(in srgb, var(--sn-cat-instance, #5cd87a) 20%, transparent);
      border-color: var(--sn-cat-instance, #5cd87a);
      color: var(--sn-cat-instance, #5cd87a);
    }

    header .demo-btn .material-symbols-outlined {
      font-size: 16px;
    }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    main panel-layout {
      flex: 1;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <header>
    <h1>symbiote-node</h1>
    <span class="badge">Demo</span>
    <span class="spacer"></span>
    <button id="btnPlay" class="demo-btn" title="Toggle data flow animation">
      <span class="material-symbols-outlined">play_arrow</span> Play
    </button>
    <button id="btnFollow" class="demo-btn" title="Camera follows active node">
      <span class="material-symbols-outlined">my_location</span> Follow
    </button>
    <button id="btnTheme" class="demo-btn" title="Switch theme">
      <span class="material-symbols-outlined">palette</span> Theme
    </button>
    <button id="btnWireStyle" class="demo-btn" title="Switch wire style">
      <span class="material-symbols-outlined">timeline</span> Bezier
    </button>
    <button id="btnCopyLayout" class="demo-btn" title="Copy node positions to clipboard">
      <span class="material-symbols-outlined">content_copy</span> Copy Layout
    </button>
    <a href="benchmark.html" class="demo-btn" title="Run performance benchmark">
      <span class="material-symbols-outlined">speed</span> Benchmark
    </a>
  </header>
  <main>
    <layout-sidebar></layout-sidebar>
    <panel-layout storage-key="symbiote-node-demo-v4"></panel-layout>
  </main>
  <script type="importmap">
    {
      "imports": {
        "@symbiotejs/symbiote": "https://esm.sh/@symbiotejs/symbiote@3.2.1"
      }
    }
  </script>
  <script type="module" src="demo.js"></script>
</body>

</html>
