<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TreeLayout Test</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #1a1a2e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 10px 20px;
      background: #2d2d3d;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 14px; font-weight: 600; }
    header .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      background: rgba(200,117,51,0.2); color: #c87533;
    }
    .spacer { flex: 1; }
    .btn {
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
      padding: 5px 12px; border: 1px solid #555; border-radius: 4px;
      background: #3d3d4d; color: #d4d4d4; cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #4d4d5d; }
    .btn.active { background: rgba(92,216,122,0.2); border-color: #5cd87a; color: #5cd87a; }
    #log {
      position: fixed; bottom: 0; left: 0; right: 0; height: 120px;
      background: #111; color: #0f0; font-family: monospace; font-size: 11px;
      overflow-y: auto; padding: 8px; z-index: 100;
      border-top: 1px solid #333;
    }
    main { flex: 1; display: flex; overflow: hidden; }
    #canvas-area { flex: 1; overflow: hidden; position: relative; }
  </style>
</head>
<body>
  <header>
    <h1>TreeLayout Test</h1>
    <span class="badge">Debug</span>
    <span class="spacer"></span>
    <button id="btnFit" class="btn">FIT</button>
    <button id="btnMeasure" class="btn">Measure + Relayout</button>
    <button id="btnDump" class="btn">Dump Positions</button>
    <button id="btnClear" class="btn">Clear Log</button>
  </header>
  <main>
    <div id="canvas-area"></div>
  </main>
  <div id="log"></div>

  <script type="importmap">
    {
      "imports": {
        "@symbiotejs/symbiote": "https://esm.sh/@symbiotejs/symbiote@3.2.1"
      }
    }
  </script>
  <script type="module">
    import {
      NodeEditor, Node, SubgraphNode, Connection, Socket, Input, Output,
      NodeCanvas, computeAutoLayout, computeTreeLayout, applyTheme,
      DARK_DEFAULT,
    } from '../index.js';
    import { PCB_DARK } from '../themes/pcb.js';

    // --- Logging ---
    const logEl = document.getElementById('log');
    function log(msg) {
      const line = document.createElement('div');
      line.textContent = `[${new Date().toISOString().slice(11,19)}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Intercept console.log for [TreeLayout] and [AutoLayout] messages
    const origLog = console.log;
    console.log = (...args) => {
      origLog(...args);
      const str = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
      if (str.includes('[TreeLayout]') || str.includes('[DepGraph]') || str.includes('[AutoLayout]')) {
        log(str);
      }
    };

    // --- Build a fake directory structure ---
    const S_IMP = new Socket('import'); S_IMP.color = '#c87533';
    const S_EXP = new Socket('export'); S_EXP.color = '#c87533';

    const editor = new NodeEditor();

    // Simulate a realistic directory tree:
    // src/
    //   src/core/         (5 files)
    //   src/network/      (3 files)
    //   src/io/           (2 files)
    //   src/compact/      (4 files)
    // tests/              (2 files)
    // web/
    //   web/panels/       (3 files)
    //   web/components/   (2 files)
    // vendor/             (1 file)

    const dirs = [
      { path: 'src/', label: 'src', files: 5 },
      { path: 'src/core/', label: 'core', files: 8 },
      { path: 'src/network/', label: 'network', files: 3 },
      { path: 'src/io/', label: 'io', files: 2 },
      { path: 'src/compact/', label: 'compact', files: 4 },
      { path: 'tests/', label: 'tests', files: 2 },
      { path: 'web/', label: 'web', files: 1 },
      { path: 'web/panels/', label: 'panels', files: 6 },
      { path: 'web/components/', label: 'components', files: 3 },
      { path: 'vendor/', label: 'vendor', files: 1 },
    ];

    const dirNodes = new Map(); // path → SubgraphNode
    const dirPaths = {};        // nodeId → path

    for (const dir of dirs) {
      const sg = new SubgraphNode(dir.label, { category: 'directory' });
      sg.params = { path: dir.path, isDirectory: true };
      sg.addOutput('out', new Output(S_EXP, ''));
      sg.addInput('in', new Input(S_IMP, ''));

      // Add dummy file nodes inside
      const inner = sg.getInnerEditor();
      for (let i = 0; i < dir.files; i++) {
        const fn = new Node(`file${i}.js`, { type: 'file', category: 'file' });
        inner.addNode(fn);
      }

      editor.addNode(sg);
      dirNodes.set(dir.path, sg);
      dirPaths[sg.id] = dir.path;
    }

    // Add some cross-directory edges
    const edges = [
      ['src/core/', 'src/network/'],
      ['src/core/', 'src/io/'],
      ['src/network/', 'src/io/'],
      ['src/compact/', 'src/core/'],
      ['web/panels/', 'src/core/'],
      ['web/panels/', 'src/network/'],
      ['web/components/', 'web/panels/'],
      ['tests/', 'src/core/'],
      ['vendor/', 'src/'],
    ];

    for (const [fromPath, toPath] of edges) {
      const fromNode = dirNodes.get(fromPath);
      const toNode = dirNodes.get(toPath);
      if (fromNode && toNode) {
        try {
          editor.addConnection(new Connection(fromNode, 'out', toNode, 'in'));
        } catch (e) { log(`Edge error: ${fromPath} → ${toPath}: ${e.message}`); }
      }
    }

    log(`Built editor: ${[...editor.getNodes()].length} nodes, ${[...editor.getConnections()].length} edges`);
    log(`dirPaths: ${JSON.stringify(dirPaths, null, 0)}`);

    // --- Canvas setup ---
    const container = document.getElementById('canvas-area');
    const canvas = new NodeCanvas();
    container.appendChild(canvas);
    applyTheme(canvas, PCB_DARK);
    canvas.setEditor(editor);
    canvas.setReadonly(true);
    canvas.setPathStyle('pcb');

    // --- Pass 1: Tree Layout ---
    log('--- Pass 1: TreeLayout with estimated sizes ---');
    const positions = computeTreeLayout(editor, {
      dirPaths,
      nodeWidth: 250,
      nodeHeight: 100,
      gapX: 40,
      gapY: 20,
      startX: 60,
      startY: 60,
    });

    canvas.setBatchMode(true);
    for (const [nodeId, pos] of Object.entries(positions)) {
      canvas.setNodePosition(nodeId, pos.x, pos.y);
      const node = [...editor.getNodes()].find(n => n.id === nodeId);
      log(`  ${node?.label || nodeId}: x=${pos.x.toFixed(0)}, y=${pos.y.toFixed(0)}`);
    }
    canvas.setBatchMode(false);
    canvas.refreshConnections();

    // --- Pass 2: Measure + relayout ---
    function doPass2() {
      log('--- Pass 2: Measuring DOM sizes ---');
      const nodeSizes = canvas.measureNodeSizes();
      for (const [id, size] of Object.entries(nodeSizes)) {
        const node = [...editor.getNodes()].find(n => n.id === id);
        log(`  ${node?.label || id}: ${size.w}×${size.h}`);
      }

      if (Object.keys(nodeSizes).length === 0) {
        log('ERROR: No DOM sizes measured!');
        return;
      }

      const corrected = computeTreeLayout(editor, {
        dirPaths, nodeSizes,
        nodeWidth: 250, nodeHeight: 100,
        gapX: 40, gapY: 20,
        startX: 60, startY: 60,
      });

      canvas.setBatchMode(true);
      for (const [nodeId, pos] of Object.entries(corrected)) {
        canvas.setNodePosition(nodeId, pos.x, pos.y);
        const node = [...editor.getNodes()].find(n => n.id === nodeId);
        log(`  ${node?.label || nodeId}: x=${pos.x.toFixed(0)}, y=${pos.y.toFixed(0)}`);
      }
      canvas.setBatchMode(false);
      canvas.refreshConnections();
      log('Pass 2 complete');
    }

    // Auto-run Pass 2 after DOM render
    requestAnimationFrame(() => {
      doPass2();
      // Auto-fit
      canvas.fitView?.();
    });

    // --- Buttons ---
    document.getElementById('btnFit').onclick = () => canvas.fitView?.();
    document.getElementById('btnMeasure').onclick = doPass2;
    document.getElementById('btnDump').onclick = () => {
      const pos = canvas.getPositions();
      log('Positions: ' + JSON.stringify(pos, null, 2));
    };
    document.getElementById('btnClear').onclick = () => { logEl.innerHTML = ''; };
  </script>
</body>
</html>
