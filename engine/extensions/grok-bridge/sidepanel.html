<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Grok Bridge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 12px;
      min-height: 100vh;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #00d4aa;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #252542;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }

    .status-dot.connected {
      background: #00d4aa;
    }

    .status-dot.disconnected {
      background: #ff4757;
    }

    .events {
      background: #0d0d1a;
      border-radius: 8px;
      padding: 8px;
      height: calc(100vh - 120px);
      overflow-y: auto;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 11px;
    }

    .event {
      padding: 4px 8px;
      border-bottom: 1px solid #252542;
      display: flex;
      gap: 8px;
    }

    .event:last-child {
      border-bottom: none;
    }

    .event-time {
      color: #666;
      flex-shrink: 0;
    }

    .event-type {
      flex-shrink: 0;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      text-transform: uppercase;
    }

    .event-type.command {
      background: #3742fa;
      color: #fff;
    }

    .event-type.result {
      background: #00d4aa;
      color: #000;
    }

    .event-type.error {
      background: #ff4757;
      color: #fff;
    }

    .event-type.info {
      background: #666;
      color: #fff;
    }

    .event-data {
      color: #aaa;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      color: #666;
      text-align: center;
      padding: 40px;
    }
  </style>
</head>

<body>
  <h1>🌉 Grok Bridge v4</h1>

  <div class="status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Connecting...</span>
  </div>

  <div class="actions" style="margin-bottom: 12px;">
    <button id="exportCookies" style="
      background: #00d4aa;
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
      width: 100%;
    ">🍪 Export Cookies</button>
    <button id="showZonesBtn" style="
      background: #ff6b6b;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
      width: 100%;
      margin-top: 8px;
    ">🎯 Show Zones</button>
    <div id="layerButtons" style="display:none; margin-top: 8px; gap: 4px; flex-wrap: wrap;">
      <button class="layer-btn" data-layer="buttons"
        style="background:#ff4757;color:white;border:none;padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer;">🔴
        Buttons</button>
      <button class="layer-btn" data-layer="inputs"
        style="background:#2ed573;color:white;border:none;padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer;">🟢
        Inputs</button>
      <button class="layer-btn" data-layer="images"
        style="background:#00bfff;color:white;border:none;padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer;">🔵
        Images</button>
      <button class="layer-btn" data-layer="all"
        style="background:#666;color:white;border:none;padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer;">⚪
        All</button>
    </div>
    <div id="cookieStatus" style="
      font-size: 11px;
      color: #666;
      margin-top: 6px;
      text-align: center;
    "></div>
  </div>

  <!-- Image Generation -->
  <div style="margin-bottom: 12px; background: #252542; border-radius: 8px; padding: 12px;">
    <div style="font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #00d4aa;">🎨 Generate Image</div>
    <input type="text" id="promptInput" placeholder="Enter your prompt..." style="
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      background: #0d0d1a;
      color: #eee;
      font-size: 13px;
      margin-bottom: 8px;
    ">
    <select id="aspectRatio" style="
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #0d0d1a;
      color: #eee;
      font-size: 12px;
      margin-bottom: 8px;
    ">
      <option value="2:3">Portrait (2:3)</option>
      <option value="3:2">Landscape (3:2)</option>
      <option value="1:1">Square (1:1)</option>
      <option value="16:9">Wide (16:9)</option>
      <option value="9:16">Tall (9:16)</option>
    </select>
    <button id="generateBtn" style="
      background: #3742fa;
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
    ">🚀 Generate</button>
    <div id="generateStatus" style="
      font-size: 11px;
      color: #666;
      margin-top: 8px;
      text-align: center;
    "></div>
    <div id="resultContainer" style="display: none; margin-top: 10px;">
      <img id="resultImage" style="width: 100%; border-radius: 6px; margin-bottom: 6px;">
      <a id="resultLink" href="#" target="_blank" style="
        font-size: 11px;
        color: #00d4aa;
        display: block;
        text-align: center;
      ">Open Full Image</a>
    </div>
  </div>

  <div class="events" id="events" style="height: calc(100vh - 380px);">
    <div class="empty">Waiting for events...</div>
  </div>

  <script src="sidepanel.js"></script>
</body>

</html>
